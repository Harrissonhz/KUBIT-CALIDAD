<!DOCTYPE html>
<html lang="es" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kubit POS — Iniciar Sesión</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/estilo.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#020617">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="icon" href="img/icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="img/icon.svg">
</head>
<body class="min-h-screen flex items-center justify-center bg-slate-50 dark:bg-slate-950 p-4 transition-colors duration-300">
  <div class="w-full max-w-sm">
    <div class="text-center mb-10">
      <div class="w-14 h-14 bg-slate-950 dark:bg-white rounded-2xl flex items-center justify-center mx-auto mb-5 shadow-sm">
        <span class="text-white dark:text-slate-950 text-2xl font-bold">K</span>
      </div>
      <h1 class="text-2xl font-semibold text-slate-950 dark:text-white">Kubit POS</h1>
      <p class="text-sm text-slate-500 dark:text-slate-400 mt-1">Inicia sesión para continuar</p>
    </div>

    <form id="form-login" class="space-y-4" onsubmit="return false;">
      <div>
        <label for="email" class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wider">Email</label>
        <input type="email" id="email" autocomplete="username"
          class="w-full px-4 py-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200/60 dark:border-slate-800 text-slate-950 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-950 dark:focus:ring-white/20 transition-all text-sm"
          placeholder="admin@ejemplo.com">
      </div>

      <div>
        <label for="password" class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wider">Contraseña</label>
        <input type="password" id="password" autocomplete="current-password"
          class="w-full px-4 py-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200/60 dark:border-slate-800 text-slate-950 dark:text-white placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-slate-950 dark:focus:ring-white/20 transition-all text-sm"
          placeholder="••••••••">
      </div>

      <div>
        <label for="caja" class="block text-xs font-medium text-slate-500 dark:text-slate-400 mb-1.5 uppercase tracking-wider">Caja</label>
        <select id="caja"
          class="w-full px-4 py-3 rounded-xl bg-white dark:bg-slate-900 border border-slate-200/60 dark:border-slate-800 text-slate-950 dark:text-white focus:outline-none focus:ring-2 focus:ring-slate-950 dark:focus:ring-white/20 transition-all text-sm appearance-none">
          <option value="">Seleccionar caja...</option>
          <option value="c1" selected>Caja Principal — Sede Central</option>
          <option value="c2">Caja Secundaria — Local Norte</option>
        </select>
      </div>

      <div id="login-error" class="text-red-500 text-xs text-center hidden"></div>

      <button type="submit" id="btn-ingresar"
        class="w-full py-3.5 rounded-xl bg-slate-950 dark:bg-white text-white dark:text-slate-950 font-medium text-sm hover:bg-slate-800 dark:hover:bg-slate-100 transition-all active:scale-[0.98] shadow-sm">
        Ingresar
      </button>
    </form>

    <div class="mt-8 text-center">
      <button id="toggle-dark" class="text-xs text-slate-400 hover:text-slate-950 dark:hover:text-white transition-colors">
        Modo oscuro
      </button>
    </div>
  </div>

  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/compartido/database.js"></script>
  <script src="js/compartido/auth.js"></script>
  <script src="js/paginas/login.js"></script>
</body>
</html>
