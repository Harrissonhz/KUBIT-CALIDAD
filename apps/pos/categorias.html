<!DOCTYPE html>
<html lang="es" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kubit POS — Categorías</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/estilo.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#020617">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="icon" href="img/icon.svg" type="image/svg+xml">
</head>
<body class="h-screen flex flex-col bg-slate-50 dark:bg-slate-950 overflow-hidden">

  <header class="shrink-0 bg-white dark:bg-slate-900 border-b border-slate-200/60 dark:border-slate-800 px-4 py-3 flex items-center justify-between z-30">
    <div class="flex items-center gap-3">
      <a href="productos.html" class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-500 dark:text-slate-400" aria-label="Volver">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
      </a>
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 bg-slate-950 dark:bg-white rounded-lg flex items-center justify-center">
          <span class="text-white dark:text-slate-950 font-bold text-sm">K</span>
        </div>
        <div>
          <h1 class="text-sm font-semibold text-slate-950 dark:text-white leading-tight">Categorías</h1>
          <p class="text-xs text-slate-400 dark:text-slate-500 leading-tight">Gestión de categorías de productos</p>
        </div>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button id="btn-dark" class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-500 dark:text-slate-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0118 15.75 9.75 9.75 0 0112 6.75c0-2.25.75-4.25 2-5.75A9.75 9.75 0 0021.752 15.002z"/></svg>
      </button>
    </div>
  </header>

  <div class="flex-1 overflow-y-auto p-4 sm:p-6 max-w-4xl mx-auto w-full space-y-4">

    <!-- Formulario -->
    <div class="bg-white dark:bg-slate-900 border border-slate-200/60 dark:border-slate-800 rounded-xl p-4 sm:p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold text-slate-950 dark:text-white" id="form-titulo">Nueva Categoría</h2>
        <span class="text-xs text-slate-400" id="form-categoria-id"></span>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
        <div>
          <label class="label-campo">Nombre</label>
          <input type="text" id="campo-nombre" class="input-campo" placeholder="Ej: Zapatos">
        </div>
        <div>
          <label class="label-campo">Código</label>
          <input type="text" id="campo-codigo" class="input-campo" placeholder="Ej: zapatos">
        </div>
        <div>
          <label class="label-campo">Categoría Padre</label>
          <select id="campo-padre" class="input-campo"><option value="">Ninguna (raíz)</option></select>
        </div>
        <div>
          <label class="label-campo">Color</label>
          <div class="flex gap-2">
            <input type="color" id="campo-color" class="w-10 h-10 rounded-lg border border-slate-200 dark:border-slate-700 cursor-pointer" value="#64748b">
            <input type="text" id="campo-color-texto" class="input-campo flex-1" placeholder="#64748b" value="#64748b">
          </div>
        </div>
        <div class="sm:col-span-2">
          <label class="label-campo">Descripción</label>
          <textarea id="campo-descripcion" class="input-campo" rows="2" placeholder="Descripción opcional"></textarea>
        </div>
        <div class="flex items-center gap-4">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" id="campo-activa" checked class="w-4 h-4 rounded border-slate-300 dark:border-slate-600 text-slate-950 dark:text-white">
            <span class="text-sm text-slate-700 dark:text-slate-300">Categoría Activa</span>
          </label>
        </div>
      </div>
      <div class="flex gap-2 mt-4 pt-4 border-t border-slate-200/60 dark:border-slate-800">
        <button id="btn-guardar" class="px-6 py-2.5 rounded-xl bg-slate-950 dark:bg-white text-white dark:text-slate-950 text-sm font-medium hover:bg-slate-800 dark:hover:bg-slate-100 transition-all">Guardar</button>
        <button id="btn-limpiar-form" class="px-6 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-500 text-sm hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">Limpiar</button>
      </div>
    </div>

    <!-- Tabla -->
    <div class="bg-white dark:bg-slate-900 border border-slate-200/60 dark:border-slate-800 rounded-xl p-4 sm:p-6">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-4">
        <h2 class="text-sm font-semibold text-slate-950 dark:text-white">Lista de Categorías</h2>
        <input type="text" id="buscador" class="px-3 py-2 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-950 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-slate-950 dark:focus:ring-white/20 w-48" placeholder="Buscar categoría...">
      </div>
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-slate-200/60 dark:border-slate-800">
              <th class="text-left py-3 px-2 text-xs text-slate-400 font-medium uppercase tracking-wider">Nombre</th>
              <th class="text-left py-3 px-2 text-xs text-slate-400 font-medium uppercase tracking-wider hidden sm:table-cell">Código</th>
              <th class="text-left py-3 px-2 text-xs text-slate-400 font-medium uppercase tracking-wider hidden md:table-cell">Padre</th>
              <th class="text-center py-3 px-2 text-xs text-slate-400 font-medium uppercase tracking-wider">Estado</th>
              <th class="text-right py-3 px-2 text-xs text-slate-400 font-medium uppercase tracking-wider">Acción</th>
            </tr>
          </thead>
          <tbody id="categorias-tbody"></tbody>
        </table>
        <div id="categorias-empty" class="text-center text-sm text-slate-400 py-8 hidden">No hay categorías registradas</div>
      </div>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/compartido/database.js"></script>
  <script src="js/compartido/auth.js"></script>
  <script src="js/paginas/categorias.js"></script>
</body>
</html>
