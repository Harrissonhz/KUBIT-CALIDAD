<!DOCTYPE html>
<html lang="es" class="">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Kubit POS — Productos</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Poppins', 'sans-serif'] }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/estilo.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#020617">
  <meta name="mobile-web-app-capable" content="yes">
  <link rel="icon" href="img/icon.svg" type="image/svg+xml">
</head>
<body class="h-screen flex flex-col bg-slate-50 dark:bg-slate-950 overflow-hidden">

  <header class="shrink-0 bg-white dark:bg-slate-900 border-b border-slate-200/60 dark:border-slate-800 px-4 py-3 flex items-center justify-between z-30">
    <div class="flex items-center gap-3">
      <a href="ventas.html" class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-500 dark:text-slate-400" aria-label="Volver">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 19.5L8.25 12l7.5-7.5"/></svg>
      </a>
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 bg-slate-950 dark:bg-white rounded-lg flex items-center justify-center">
          <span class="text-white dark:text-slate-950 font-bold text-sm">K</span>
        </div>
        <div>
          <h1 class="text-sm font-semibold text-slate-950 dark:text-white leading-tight">Productos</h1>
          <p class="text-xs text-slate-400 dark:text-slate-500 leading-tight">Gestión de productos e inventario</p>
        </div>
      </div>
    </div>
    <div class="flex items-center gap-2">
      <button id="btn-dark" class="w-9 h-9 flex items-center justify-center rounded-xl hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors text-slate-500 dark:text-slate-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0118 15.75 9.75 9.75 0 0112 6.75c0-2.25.75-4.25 2-5.75A9.75 9.75 0 0021.752 15.002z"/></svg>
      </button>
    </div>
  </header>

  <div class="flex-1 overflow-y-auto p-4 sm:p-6 max-w-5xl mx-auto w-full space-y-4">

    <!-- Formulario de producto -->
    <div class="bg-white dark:bg-slate-900 border border-slate-200/60 dark:border-slate-800 rounded-xl p-4 sm:p-6">
      <div class="flex items-center justify-between mb-4">
        <h2 class="text-sm font-semibold text-slate-950 dark:text-white" id="form-titulo">Nuevo Producto</h2>
        <span class="text-xs text-slate-400" id="form-producto-id"></span>
      </div>
      <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-4">

        <div class="sm:col-span-2 lg:col-span-3">
          <label class="label-campo">Nombre del Producto</label>
          <input type="text" id="campo-nombre" class="input-campo" placeholder="Ej: Zapatillas Nike Air Max">
        </div>

        <div>
          <label class="label-campo">Categoría</label>
          <select id="campo-categoria" class="input-campo"></select>
        </div>

        <div>
          <label class="label-campo">Código Interno</label>
          <input type="text" id="campo-codigo-interno" class="input-campo" placeholder="Opcional">
        </div>

        <div>
          <label class="label-campo">Código de Barras</label>
          <input type="text" id="campo-codigo-barras" class="input-campo" placeholder="Opcional">
        </div>

        <div>
          <label class="label-campo">Marca</label>
          <input type="text" id="campo-marca" class="input-campo" placeholder="Ej: Nike">
        </div>

        <div>
          <label class="label-campo">Modelo</label>
          <input type="text" id="campo-modelo" class="input-campo" placeholder="Opcional">
        </div>

        <div class="sm:col-span-2 lg:col-span-3">
          <label class="label-campo">Descripción</label>
          <textarea id="campo-descripcion" class="input-campo" rows="2" placeholder="Descripción opcional"></textarea>
        </div>

        <div>
          <label class="label-campo">Precio Venta ($)</label>
          <input type="number" id="campo-precio-venta" class="input-campo" step="0.01" min="0" placeholder="0.00">
        </div>

        <div>
          <label class="label-campo">Precio Compra ($)</label>
          <input type="number" id="campo-precio-compra" class="input-campo" step="0.01" min="0" placeholder="0.00">
        </div>

        <div>
          <label class="label-campo">Margen (%)</label>
          <input type="text" id="campo-margen" class="input-campo" readonly placeholder="Auto">
        </div>

        <div>
          <label class="label-campo">Descuento Máx (%)</label>
          <input type="number" id="campo-descuento-max" class="input-campo" step="1" min="0" max="100" value="0" placeholder="0">
        </div>

        <div>
          <label class="label-campo">Tasa Impuesto (%)</label>
          <select id="campo-impuesto" class="input-campo">
            <option value="0">0%</option>
            <option value="5">5%</option>
            <option value="19" selected>19%</option>
          </select>
        </div>

        <div>
          <label class="label-campo">Precio Mayorista ($)</label>
          <input type="number" id="campo-precio-mayorista" class="input-campo" step="0.01" min="0" placeholder="Opcional">
        </div>

        <div>
          <label class="label-campo">Stock Actual</label>
          <input type="number" id="campo-stock" class="input-campo" step="1" min="0" value="0">
        </div>

        <div>
          <label class="label-campo">Stock Mínimo</label>
          <input type="number" id="campo-stock-min" class="input-campo" step="1" min="0" value="0">
        </div>

        <div>
          <label class="label-campo">Stock Máximo</label>
          <input type="number" id="campo-stock-max" class="input-campo" step="1" min="0" value="0">
        </div>

        <div class="sm:col-span-2 lg:col-span-3">
          <label class="label-campo">Tags (separados por coma)</label>
          <input type="text" id="campo-tags" class="input-campo" placeholder="Ej: destacado, oferta, nuevo">
        </div>

        <div class="sm:col-span-2 lg:col-span-3 flex items-center gap-4">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" id="campo-activo" checked class="w-4 h-4 rounded border-slate-300 dark:border-slate-600 text-slate-950 dark:text-white">
            <span class="text-sm text-slate-700 dark:text-slate-300">Producto Activo</span>
          </label>
        </div>

      </div>
      <div class="flex gap-2 mt-4 pt-4 border-t border-slate-200/60 dark:border-slate-800">
        <button id="btn-guardar" class="px-6 py-2.5 rounded-xl bg-slate-950 dark:bg-white text-white dark:text-slate-950 text-sm font-medium hover:bg-slate-800 dark:hover:bg-slate-100 transition-all">Guardar</button>
        <button id="btn-limpiar-form" class="px-6 py-2.5 rounded-xl border border-slate-200 dark:border-slate-700 text-slate-500 text-sm hover:bg-slate-50 dark:hover:bg-slate-800 transition-all">Limpiar</button>
      </div>
    </div>

    <!-- Tabla de productos -->
    <div class="bg-white dark:bg-slate-900 border border-slate-200/60 dark:border-slate-800 rounded-xl p-4 sm:p-6">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-4">
        <h2 class="text-sm font-semibold text-slate-950 dark:text-white">Lista de Productos</h2>
        <div class="flex gap-2">
          <input type="text" id="buscador-productos" class="px-3 py-2 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-950 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-slate-950 dark:focus:ring-white/20 w-48" placeholder="Buscar producto...">
          <select id="filtro-categoria" class="px-3 py-2 rounded-lg bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 text-slate-950 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-slate-950 dark:focus:ring-white/20">
            <option value="">Todas</option>
          </select>
        </div>
      </div>
      <div id="tabla-productos" class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="border-b border-slate-200/60 dark:border-slate-800">
              <th class="text-left py-3 px-2 text-xs text-slate-400 font-medium uppercase tracking-wider">Producto</th>
              <th class="text-left py-3 px-2 text-xs text-slate-400 font-medium uppercase tracking-wider hidden sm:table-cell">Categoría</th>
              <th class="text-center py-3 px-2 text-xs text-slate-400 font-medium uppercase tracking-wider hidden md:table-cell">Código</th>
              <th class="text-center py-3 px-2 text-xs text-slate-400 font-medium uppercase tracking-wider">Stock</th>
              <th class="text-right py-3 px-2 text-xs text-slate-400 font-medium uppercase tracking-wider">Precio</th>
              <th class="text-right py-3 px-2 text-xs text-slate-400 font-medium uppercase tracking-wider hidden sm:table-cell">Acción</th>
            </tr>
          </thead>
          <tbody id="productos-tbody"></tbody>
        </table>
        <div id="productos-empty" class="text-center text-sm text-slate-400 py-8 hidden">No hay productos registrados</div>
      </div>
    </div>

  </div>

  <script src="js/config.js"></script>
  <script src="js/supabase.js"></script>
  <script src="js/compartido/database.js"></script>
  <script src="js/compartido/auth.js"></script>
  <script src="js/paginas/productos.js"></script>
</body>
</html>
