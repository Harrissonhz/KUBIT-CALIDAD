<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Limpiar Service Worker</title>
</head>
<body style="display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;font-family:sans-serif;background:#0f172a;color:#e2e8f0;">
  <div style="text-align:center;max-width:480px;padding:2rem;">
    <h1 style="font-size:1.5rem;font-weight:600;margin-bottom:1rem;color:#f8fafc;">Limpiando...</h1>
    <p id="status" style="color:#94a3b8;margin-bottom:1.5rem;">Borrando cache, desregistrando SW y limpiando localStorage...</p>
    <div id="done" style="display:none;">
      <p style="color:#22c55e;font-weight:500;margin-bottom:1.5rem;">Todo limpiado correctamente.</p>
      <button onclick="location.href='login.html'" style="padding:12px 32px;border:none;border-radius:12px;background:#f8fafc;color:#0f172a;font-size:1rem;font-weight:500;cursor:pointer;">Ir a Login</button>
    </div>
  </div>
  <script>
    (async function () {
      var status = document.getElementById('status');
      var done = document.getElementById('done');

      try {
        // 1. Borrar todos los caches
        var keys = await caches.keys();
        await Promise.all(keys.map(function (k) { return caches.delete(k); }));
        status.textContent = 'Caches borrados (' + keys.length + ').';

        // 2. Desregistrar todos los SW
        if (navigator.serviceWorker) {
          var registrations = await navigator.serviceWorker.getRegistrations();
          await Promise.all(registrations.map(function (r) { return r.unregister(); }));
          status.textContent = 'Caches borrados, SW desregistrados (' + registrations.length + ').';
        }

        // 3. Limpiar localStorage
        localStorage.clear();
        status.textContent = 'Cache, SW y localStorage limpiados.';

      } catch (e) {
        status.textContent = 'Error: ' + e.message;
      }

      done.style.display = 'block';
    })();
  </script>
</body>
</html>
