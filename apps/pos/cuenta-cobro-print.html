<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cuenta de Cobro — Kubit POS</title>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#020617">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="img/icon-192x192.png">
  <link rel="icon" href="img/icon.svg" type="image/svg+xml">
  <script src="js/config.js" charset="UTF-8"></script>
  <script src="js/supabase.js" charset="UTF-8"></script>
  <script src="js/compartido/database.js" charset="UTF-8"></script>
  <style>
    /* ════════════════════════════════════════════════════════════
       RESET & BASE
       ════════════════════════════════════════════════════════════ */
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: #f8f7f4;
      color: #1e293b;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 28px 16px;
      min-height: 100vh;
    }

    /* ════════════════════════════════════════════════════════════
       LOADING
       ════════════════════════════════════════════════════════════ */
    #loading {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 14px;
      min-height: 40vh;
    }

    .spinner {
      width: 32px;
      height: 32px;
      border: 3px solid #e2e8f0;
      border-top-color: #0f172a;
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ════════════════════════════════════════════════════════════
       INVOICE CONTAINER & CARD
       ════════════════════════════════════════════════════════════ */
    #document-container {
      display: none;
      width: 100%;
      max-width: 210mm;
    }

    .document {
      background: #fff;
      border: 1px solid #d1d5db;
      border-radius: 10px;
      padding: 36px 32px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, .06);
    }

    /* ════════════════════════════════════════════════════════════
       HEADER — Brand left + Title right
       ════════════════════════════════════════════════════════════ */
    .cc-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding-bottom: 20px;
      border-bottom: 2px solid #0f172a;
      margin-bottom: 18px;
    }

    .cc-brand {
      display: flex;
      flex-direction: column;
      gap: 1px;
    }

    .cc-brand-top {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .cc-logo {
      height: 60px;
      width: auto;
      object-fit: contain;
      border-radius: 4px;
    }

    .cc-brand h2 {
      font-size: 19px;
      font-weight: 700;
      color: #0f172a;
      letter-spacing: -.3px;
      line-height: 1.2;
    }

    .cc-datos {
      font-size: 11px;
      color: #64748b;
      line-height: 1.55;
      margin-top: 3px;
    }

    .cc-datos span {
      display: inline-block;
      margin-right: 16px;
    }

    .cc-title {
      text-align: right;
      flex-shrink: 0;
    }

    .cc-title h1 {
      font-family: Georgia, 'Times New Roman', serif;
      font-size: 20px;
      font-weight: 800;
      color: #0f172a;
      letter-spacing: 1.2px;
      text-transform: uppercase;
    }

    .cc-title .cc-numero {
      font-size: 13px;
      font-weight: 600;
      color: #334155;
      margin-top: 3px;
    }

    .cc-title .cc-fecha {
      font-size: 12px;
      color: #64748b;
      margin-top: 1px;
    }

    /* ════════════════════════════════════════════════════════════
       INFO BOXES — "Cobrar a" left / Info right
       ════════════════════════════════════════════════════════════ */
    .cc-info {
      display: flex;
      gap: 20px;
      margin-bottom: 22px;
    }

    .cc-info-box {
      flex: 1;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      padding: 14px 16px;
      background: #fafafa;
    }

    .cc-info-box h3 {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .6px;
      color: #64748b;
      border-bottom: 1px solid #e2e8f0;
      padding-bottom: 6px;
      margin-bottom: 8px;
    }

    .cc-info-box p {
      font-size: 12px;
      line-height: 1.55;
      color: #1e293b;
    }

    .cc-info-box .info-label {
      font-size: 10px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .3px;
    }

    /* ════════════════════════════════════════════════════════════
       TABLE — 5 columnas: #, Codigo, Descripcion, Cant, Valor
       ════════════════════════════════════════════════════════════ */
    .cc-table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 18px;
      font-size: 12px;
    }

    .cc-table thead th {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
      color: #475569;
      background: #f1f5f9;
      padding: 9px 8px;
      border-bottom: 2px solid #0f172a;
      text-align: left;
      white-space: nowrap;
    }

    .cc-table tbody td {
      padding: 8px 8px;
      border-bottom: 1px solid #e2e8f0;
      color: #1e293b;
      vertical-align: top;
    }

    .cc-table tbody tr:nth-child(even) td {
      background: #fafafa;
    }

    .cc-table tbody tr:last-child td {
      border-bottom: none;
    }

    /* Column-specific alignment */
    .cc-col-num {
      width: 28px;
      text-align: center;
      color: #94a3b8;
      font-size: 11px;
    }
    .cc-col-codigo {
      width: 100px;
      font-family: 'Consolas', 'Courier New', monospace;
      font-size: 11px;
      color: #64748b;
    }
    .cc-col-cant {
      width: 56px;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .cc-col-valor {
      width: 130px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-weight: 600;
    }

    .cc-empty-row {
      text-align: center;
      color: #94a3b8;
      padding: 20px 0 !important;
    }

    /* ════════════════════════════════════════════════════════════
       TOTALS — Subtotal, Descuento, Total (sin IVA)
       ════════════════════════════════════════════════════════════ */
    .cc-totals {
      border-top: 2px solid #0f172a;
      padding-top: 12px;
      margin-bottom: 24px;
      max-width: 280px;
      margin-left: auto;
    }

    .cc-totals-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
      padding: 4px 0;
      color: #475569;
      font-variant-numeric: tabular-nums;
    }

    .cc-totals-row.total {
      font-size: 17px;
      font-weight: 800;
      color: #0f172a;
      padding-top: 10px;
      margin-top: 8px;
      border-top: 2px double #0f172a;
    }

    /* ════════════════════════════════════════════════════════════
       SIGNATURE SECTION
       ════════════════════════════════════════════════════════════ */
    .cc-signature {
      margin-bottom: 20px;
      text-align: center;
    }

    .cc-signature .sig-line {
      display: inline-block;
      width: 220px;
      border-bottom: 1px solid #0f172a;
      margin-bottom: 4px;
    }

    .cc-signature p {
      font-size: 10px;
      color: #94a3b8;
      text-transform: uppercase;
      letter-spacing: .5px;
    }

    /* ════════════════════════════════════════════════════════════
       FOOTER
       ════════════════════════════════════════════════════════════ */
    .cc-footer {
      border-top: 1px solid #d1d5db;
      padding-top: 14px;
      text-align: center;
    }

    .cc-footer .cc-ref-line {
      font-size: 11px;
      color: #475569;
      margin-bottom: 8px;
      font-weight: 500;
    }

    .cc-footer p {
      font-size: 10px;
      color: #94a3b8;
      line-height: 1.6;
    }

    /* ════════════════════════════════════════════════════════════
       ACTION BUTTONS
       ════════════════════════════════════════════════════════════ */
    .actions {
      display: flex;
      gap: 10px;
      margin-top: 20px;
      justify-content: center;
    }

    .actions button {
      padding: 10px 28px;
      border-radius: 8px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: all .15s;
      border: none;
    }

    .btn-print {
      background: #0f172a;
      color: #fff;
    }
    .btn-print:hover { background: #1e293b; }

    .btn-close {
      background: #e2e8f0;
      color: #475569;
    }
    .btn-close:hover { background: #cbd5e1; }

    /* ════════════════════════════════════════════════════════════
       ERROR MESSAGE
       ════════════════════════════════════════════════════════════ */
    #error-msg {
      display: none;
      text-align: center;
      padding: 40px 20px;
    }

    #error-msg h2 {
      font-size: 18px;
      margin-bottom: 8px;
      color: #dc2626;
    }

    #error-msg p {
      font-size: 13px;
      color: #64748b;
    }

    /* ════════════════════════════════════════════════════════════
       PRINT
       ════════════════════════════════════════════════════════════ */
    @page {
      size: A4;
      margin: 12mm 15mm;
    }

    @media print {
      body {
        background: #fff;
        padding: 0;
        min-height: auto;
      }

      #loading { display: none !important; }
      .actions { display: none !important; }

      #document-container {
        display: block !important;
      }

      .document {
        box-shadow: none;
        border-radius: 0;
        border: none;
        padding: 0;
      }

      .cc-info-box {
        background: none;
        border-color: #d1d5db;
      }

      .cc-table thead th {
        background: #f1f5f9;
      }

      .cc-table tbody tr:nth-child(even) td {
        background: #fafafa;
      }

      .cc-totals-row.total {
        border-top-color: #000;
      }

      .cc-table thead {
        display: table-header-group;
      }

      .cc-table tbody tr {
        page-break-inside: avoid;
      }
    }

    /* ════════════════════════════════════════════════════════════
       RESPONSIVE
       ════════════════════════════════════════════════════════════ */
    @media (max-width: 600px) {
      body { padding: 12px 8px; }
      .document { padding: 20px 14px; }
      .cc-header { flex-direction: column; gap: 12px; }
      .cc-title { text-align: left; }
      .cc-info { flex-direction: column; gap: 12px; }
      .cc-totals { max-width: 100%; }
      .cc-col-codigo { width: 80px; font-size: 10px; }
      .cc-col-valor { width: 110px; }
    }
  </style>
</head>

<body>

  <!-- Loading -->
  <div id="loading">
    <div class="spinner"></div>
    <p style="font-size:13px;color:#64748b;">Cargando cuenta de cobro...</p>
  </div>

  <!-- Error -->
  <div id="error-msg">
    <h2>Error al cargar la cuenta de cobro</h2>
    <p id="error-text">No se pudo obtener la informacion de la venta.</p>
    <div class="actions">
      <button class="btn-close" onclick="window.close()">Cerrar</button>
    </div>
  </div>

  <!-- Document -->
  <div id="document-container">
    <div class="document" id="document-content"></div>

    <div class="actions">
      <button class="btn-print" onclick="window.print()">Imprimir / PDF</button>
      <button class="btn-close" onclick="window.close()">Cerrar</button>
    </div>
  </div>

  <script>
    (function () {
      var $ = function (id) { return document.getElementById(id); };

      function escaparHTML(str) {
        if (!str) return '';
        return String(str).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
      }

      function formatearMoneda(valor) {
        return '$' + Number(valor || 0).toLocaleString('es-CO', { minimumFractionDigits: 0, maximumFractionDigits: 0 });
      }

      function formatearFecha(iso) {
        if (!iso) return '—';
        var d = new Date(iso);
        return d.toLocaleDateString('es-CO', {
          year: 'numeric', month: 'long', day: 'numeric',
          hour: '2-digit', minute: '2-digit'
        });
      }

      function formatearFechaCorta(iso) {
        if (!iso) return '—';
        var d = new Date(iso);
        return d.toLocaleDateString('es-CO', {
          year: 'numeric', month: '2-digit', day: '2-digit'
        });
      }

      function obtenerParametro(nombre) {
        var params = new URLSearchParams(window.location.search);
        return params.get(nombre);
      }

      async function init() {
        var ventaId = obtenerParametro('id');
        if (!ventaId) {
          mostrarError('No se ha especificado el ID de la venta.');
          return;
        }

        try {
          var [resVenta, resConfig] = await Promise.all([
            DB.ventas.obtener(ventaId),
            DB.configuracionEmpresa.obtener()
          ]);

          if (resVenta.error || !resVenta.data) {
            mostrarError('Error al cargar la venta: ' + (resVenta.error || 'Datos no encontrados'));
            return;
          }

          var venta = resVenta.data;
          var config = resConfig.data || null;

          renderizarCuentaCobro(venta, config);

          $('loading').style.display = 'none';
          $('document-container').style.display = 'block';

          setTimeout(function () { window.print(); }, 500);

        } catch (e) {
          console.error('[CuentaCobro] Error:', e);
          mostrarError('Error inesperado: ' + (e.message || 'desconocido'));
        }
      }

      function mostrarError(msg) {
        $('loading').style.display = 'none';
        $('error-msg').style.display = 'block';
        $('error-text').textContent = msg;
      }

      function renderizarCuentaCobro(v, config) {
        /* ─── Datos de empresa ─── */
        var empresaNombre = config ? config.nombre_empresa : 'Mi Empresa';
        var empresaNit = config ? config.nit : '';
        var empresaDir = config ? config.direccion : '';
        var empresaTel = config ? config.telefono : '';
        var empresaEmail = config ? config.email : '';
        var empresaLogo = config ? config.logo_url : '';
        var mensajeLegal = config ? config.mensaje_legal : '';
        var prefijo = config ? config.prefijo_facturacion : '';

        /* ─── Datos del cliente ─── */
        var clienteNombre = 'Consumidor Final';
        var clienteDoc = '';
        var clienteDir = '';
        var clienteTel = '';
        var clienteEmail = '';

        if (v.cliente) {
          var c = v.cliente;
          clienteNombre = [c.primer_nombre, c.segundo_nombre, c.primer_apellido, c.segundo_apellido].filter(Boolean).join(' ');
          var tipoDoc = c.tipo_id || '';
          clienteDoc = (tipoDoc ? tipoDoc + ' ' : '') + (c.numero_id || '');
          clienteDir = c.direccion || '';
          clienteTel = c.celular || c.telefono || '';
          clienteEmail = c.email || '';
        }

        /* ─── Datos de la venta ─── */
        var metodoPago = v.metodo_pago || '—';
        var metodoLabel = {
          'transferencia': 'Transferencia',
          'efectivo': 'Efectivo',
          'tarjeta': 'Tarjeta',
          'mixto': 'Mixto'
        }[metodoPago] || metodoPago;

        var vendedorNombre = v.usuario ? v.usuario.nombre_completo : '—';
        var numeroVenta = v.numero_venta || '—';
        if (prefijo && numeroVenta !== '—') {
          numeroVenta = prefijo + '-' + numeroVenta;
        }
        var numeroCC = 'CC-' + numeroVenta;

        /* ─── Tabla de productos ─── */
        var itemsHtml = '';
        if (v.detalles && v.detalles.length) {
          itemsHtml = v.detalles.map(function (d, i) {
            var prodName = 'Producto';
            if (d.detalle && d.detalle.producto) {
              prodName = d.detalle.producto.nombre;
            } else if (d.detalle) {
              prodName = d.detalle.codigo_interno || d.producto_detalle_id;
            }

            var codigoInterno = (d.detalle && d.detalle.codigo_interno) || '';

            return '<tr>' +
              '<td class="cc-col-num">' + (i + 1) + '</td>' +
              '<td class="cc-col-codigo">' + escaparHTML(codigoInterno) + '</td>' +
              '<td>' + escaparHTML(prodName) + '</td>' +
              '<td class="cc-col-cant">' + d.cantidad + '</td>' +
              '<td class="cc-col-valor">' + formatearMoneda(d.precio_unitario) + '</td>' +
              '</tr>';
          }).join('');
        } else {
          itemsHtml = '<tr><td class="cc-empty-row" colspan="5">Sin detalle de productos</td></tr>';
        }

        /* ─── Totals ─── */
        var descuentoHtml = '';
        if (v.descuento > 0) {
          descuentoHtml = '<div class="cc-totals-row"><span>Descuento</span><span>- ' + formatearMoneda(v.descuento) + '</span></div>';
        }

        /* ─── Render ─── */
        $('document-content').innerHTML =
          /* ── Header ── */
          '<div class="cc-header">' +
            '<div class="cc-brand">' +
              '<div class="cc-brand-top">' +
                (empresaLogo ? '<img src="' + escaparHTML(empresaLogo) + '" alt="Logo" class="cc-logo" onerror="this.style.display=\'none\'">' : '') +
                '<div>' +
                  '<h2>' + escaparHTML(empresaNombre) + '</h2>' +
                  '<div class="cc-datos">' +
                    (empresaNit ? '<span>NIT ' + escaparHTML(empresaNit) + '</span>' : '') +
                    (empresaDir ? '<span>' + escaparHTML(empresaDir) + '</span>' : '') +
                    (empresaTel ? '<span>Tel ' + escaparHTML(empresaTel) + '</span>' : '') +
                    (empresaEmail ? '<span>' + escaparHTML(empresaEmail) + '</span>' : '') +
                  '</div>' +
                '</div>' +
              '</div>' +
            '</div>' +
            '<div class="cc-title">' +
              '<h1>Cuenta de Cobro</h1>' +
              '<div class="cc-numero">No. ' + escaparHTML(numeroCC) + '</div>' +
              '<div class="cc-fecha">' + formatearFechaCorta(v.fecha_venta) + '</div>' +
            '</div>' +
          '</div>' +

          /* ── Info boxes ── */
          '<div class="cc-info">' +
            '<div class="cc-info-box">' +
              '<h3>Cobrar a</h3>' +
              '<p>' + escaparHTML(clienteNombre) + '</p>' +
              (clienteDoc ? '<p style="margin-top:4px;font-size:11px;color:#64748b;">' + escaparHTML(clienteDoc) + '</p>' : '') +
              (clienteDir ? '<p style="margin-top:4px;font-size:11px;color:#64748b;">' + escaparHTML(clienteDir) + '</p>' : '') +
              (clienteTel ? '<p style="margin-top:4px;font-size:11px;color:#64748b;">Tel: ' + escaparHTML(clienteTel) + '</p>' : '') +
              (clienteEmail ? '<p style="margin-top:4px;font-size:11px;color:#64748b;">' + escaparHTML(clienteEmail) + '</p>' : '') +
            '</div>' +
            '<div class="cc-info-box">' +
              '<h3>Informacion</h3>' +
              '<p><span class="info-label">Metodo de pago</span><br>' + metodoLabel + '</p>' +
              '<p style="margin-top:6px;"><span class="info-label">Vendedor</span><br>' + escaparHTML(vendedorNombre) + '</p>' +
              '<p style="margin-top:6px;"><span class="info-label">Derivado de Factura</span><br>' + escaparHTML(numeroVenta) + '</p>' +
            '</div>' +
          '</div>' +

          /* ── Table ── */
          '<table class="cc-table">' +
            '<thead>' +
              '<tr>' +
                '<th class="cc-col-num">#</th>' +
                '<th class="cc-col-codigo">Codigo</th>' +
                '<th>Descripcion</th>' +
                '<th class="cc-col-cant">Cant</th>' +
                '<th class="cc-col-valor">Valor Unit</th>' +
              '</tr>' +
            '</thead>' +
            '<tbody>' + itemsHtml + '</tbody>' +
          '</table>' +

          /* ── Totals ── */
          '<div class="cc-totals">' +
            '<div class="cc-totals-row">' +
              '<span>Subtotal</span>' +
              '<span>' + formatearMoneda(v.subtotal) + '</span>' +
            '</div>' +
            descuentoHtml +
            '<div class="cc-totals-row total">' +
              '<span>Total a Cobrar</span>' +
              '<span>' + formatearMoneda(v.total) + '</span>' +
            '</div>' +
          '</div>' +

          /* ── Signature ── */
          '<div class="cc-signature">' +
            '<div class="sig-line"></div>' +
            '<p>Firma del cobrador</p>' +
          '</div>' +

          /* ── Footer ── */
          '<div class="cc-footer">' +
            '<div class="cc-ref-line">Derivado de la Factura No. ' + escaparHTML(numeroVenta) + '</div>' +
            (mensajeLegal ? '<p>' + escaparHTML(mensajeLegal) + '</p>' : '') +
            '<p style="margin-top:4px;">Generado por Kubit POS — ' + formatearFecha(new Date().toISOString()) + '</p>' +
          '</div>';
      }

      document.addEventListener('DOMContentLoaded', init);
    })();
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
</body>

</html>
