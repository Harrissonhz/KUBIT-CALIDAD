<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Carrito - OutletShop</title>
  <script src="https://cdn.tailwindcss.com" charset="UTF-8"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/estilo.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#020617">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="img/icon.svg">
  <link rel="icon" type="image/svg+xml" href="img/icon.svg">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col font-['Poppins']">
  <div id="navbar"></div>

  <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 py-8 w-full pt-14">
    <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 mb-8">Tu Carrito</h1>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2 space-y-4">
        <div class="bg-white rounded-xl border border-slate-200 overflow-hidden">
          <div class="hidden sm:grid grid-cols-12 gap-4 px-6 py-3 bg-slate-50 border-b border-slate-200 text-xs font-medium text-slate-500 uppercase tracking-wide">
            <div class="col-span-6">Producto</div>
            <div class="col-span-2 text-center">Cantidad</div>
            <div class="col-span-2 text-right">Subtotal</div>
            <div class="col-span-2"></div>
          </div>

          <div id="carrito-items" class="divide-y divide-slate-100"></div>
        </div>

        <a href="index.html" class="inline-flex items-center gap-1.5 text-sm text-slate-500 hover:text-slate-900 transition-colors">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
          Seguir comprando
        </a>
      </div>

      <div class="lg:col-span-1">
        <div class="bg-white rounded-xl border border-slate-200 p-6 sticky top-24" id="resumen-pedido">
          <h2 class="text-sm font-semibold text-slate-900 mb-4">Resumen del pedido</h2>
          <div class="space-y-3 text-sm">
            <div class="flex justify-between text-slate-600">
              <span id="resumen-items">Subtotal (0 items)</span>
              <span class="text-slate-900 font-medium" id="resumen-subtotal">$0</span>
            </div>
            <div class="flex justify-between text-slate-600">
              <span>Envío</span>
              <span class="text-slate-400">Por calcular</span>
            </div>
            <hr class="border-slate-200">
            <div class="flex justify-between text-base font-semibold text-slate-900">
              <span>Total</span>
              <span id="resumen-total">$0</span>
            </div>
          </div>
          <a href="checkout.html" class="mt-6 block w-full text-center px-6 py-3 bg-slate-950 text-white text-sm font-medium rounded-lg hover:bg-slate-800 transition-colors" id="btn-checkout">
            Ir a checkout
          </a>
          <p class="mt-3 text-xs text-slate-400 text-center">Envíos a todo Colombia</p>
        </div>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <a href="https://wa.me/573054476133" class="whatsapp-float" target="_blank" rel="noopener" aria-label="WhatsApp">
    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zm-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884zm8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  </a>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
      navigator.serviceWorker.addEventListener('message', function(e) {
        if (e.data && e.data.accion === 'recargar') window.location.reload();
      });
    }
  </script>
  <script src="js/api/supabase-client.js" charset="UTF-8"></script>
  <script src="js/api/productos.js" charset="UTF-8"></script>
  <script src="js/api/categorias.js" charset="UTF-8"></script>
  <script src="js/compartido/utils.js" charset="UTF-8"></script>
  <script src="js/compartido/modal.js" charset="UTF-8"></script>
  <script src="js/compartido/navbar-store.js" charset="UTF-8"></script>
  <script src="js/compartido/footer-store.js" charset="UTF-8"></script>
  <script src="js/paginas/carrito.js" charset="UTF-8"></script>
</body>
</html>
