<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Producto - OutletShop</title>
  <script src="https://cdn.tailwindcss.com" charset="UTF-8"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/estilo.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#020617">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="img/icon.svg">
  <link rel="icon" type="image/svg+xml" href="img/icon.svg">
</head>
<body class="bg-white text-slate-900 min-h-screen flex flex-col font-['Poppins']">
  <div id="navbar"></div>

  <main id="app" class="flex-1 pt-14">
    <div class="max-w-7xl mx-auto px-4 sm:px-6 py-6">
      <nav id="breadcrumb" class="flex items-center gap-2 text-sm text-slate-400 mb-6"></nav>

      <div id="contenedor-producto" class="grid grid-cols-1 lg:grid-cols-2 gap-8 lg:gap-12">
        <div id="galeria" class="space-y-3">
          <div id="imagen-principal" class="aspect-square bg-gray-100 rounded-xl overflow-hidden border border-slate-200">
            <img src="" alt="" class="w-full h-full object-cover" id="img-principal">
          </div>
          <div id="thumbnails" class="flex gap-2 overflow-x-auto pb-1"></div>
        </div>

        <div class="flex flex-col gap-4">
          <div>
            <p id="producto-categoria" class="text-xs text-slate-400 uppercase tracking-wide mb-1"></p>
            <h1 id="producto-nombre" class="text-2xl sm:text-3xl font-bold text-slate-900 leading-tight"></h1>
          </div>

          <div id="producto-precio" class="text-3xl font-bold text-slate-900"></div>

          <p id="producto-descripcion" class="text-sm text-slate-600 leading-relaxed whitespace-pre-line"></p>

          <div id="producto-variantes" class="hidden">
            <h3 class="text-sm font-medium text-slate-900 mb-2">Presentación</h3>
            <div id="variantes-lista" class="flex flex-wrap gap-2"></div>
          </div>

          <div class="flex items-center gap-3">
            <button id="btn-agregar" class="flex-1 px-6 py-3 bg-slate-950 text-white text-sm font-medium rounded-lg hover:bg-slate-800 transition-all disabled:opacity-50 disabled:cursor-not-allowed">
              Agregar al carrito
            </button>
          </div>

          <div id="especificaciones" class="border-t border-slate-200 pt-4 mt-2">
            <h3 class="text-sm font-medium text-slate-900 mb-3">Especificaciones</h3>
            <div id="especificaciones-lista" class="space-y-2 text-slate-600"></div>
          </div>
        </div>
      </div>

      <section id="seccion-relacionados" class="mt-16 pt-8 border-t border-slate-200 hidden">
        <h2 class="text-xl font-bold text-slate-900 mb-6">Productos relacionados</h2>
        <div id="grid-relacionados" style="font-size:0;margin:0 -8px;"></div>
      </section>
    </div>
  </main>

  <div id="footer"></div>

  <a href="https://wa.me/573054476133" class="whatsapp-float" target="_blank" rel="noopener" aria-label="WhatsApp">

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
      navigator.serviceWorker.addEventListener('message', function(e) {
        if (e.data && e.data.accion === 'recargar') window.location.reload();
      });
    }
  </script>
  <script src="js/api/supabase-client.js" charset="UTF-8"></script>
  <script src="js/api/productos.js" charset="UTF-8"></script>
  <script src="js/api/categorias.js" charset="UTF-8"></script>
  <script src="js/compartido/utils.js" charset="UTF-8"></script>
  <script src="js/compartido/modal.js" charset="UTF-8"></script>
  <script src="js/compartido/card-producto.js" charset="UTF-8"></script>
  <script src="js/compartido/navbar-store.js" charset="UTF-8"></script>
  <script src="js/compartido/footer-store.js" charset="UTF-8"></script>
  <script src="js/paginas/producto.js" charset="UTF-8"></script>
</body>
</html>
