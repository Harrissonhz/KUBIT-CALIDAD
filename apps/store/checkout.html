<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout - OutletShop</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/estilo.css">
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#020617">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="apple-touch-icon" href="img/icon.svg">
</head>
<body class="bg-slate-50 text-slate-900 min-h-screen flex flex-col font-['Poppins']">
  <div id="navbar"></div>

  <main class="flex-1 max-w-7xl mx-auto px-4 sm:px-6 py-8 w-full">
    <h1 class="text-2xl sm:text-3xl font-bold text-slate-900 mb-8">Checkout</h1>

    <div class="flex items-center justify-center gap-2 sm:gap-4 mb-10 text-xs sm:text-sm">
      <div class="flex items-center gap-2">
        <span class="w-7 h-7 rounded-full bg-slate-950 text-white flex items-center justify-center text-xs font-semibold">1</span>
        <span class="font-medium text-slate-900">Dirección</span>
      </div>
      <div class="w-8 sm:w-12 h-px bg-slate-300"></div>
      <div class="flex items-center gap-2">
        <span class="w-7 h-7 rounded-full border-2 border-slate-300 text-slate-400 flex items-center justify-center text-xs font-semibold">2</span>
        <span class="text-slate-400">Pago</span>
      </div>
      <div class="w-8 sm:w-12 h-px bg-slate-300"></div>
      <div class="flex items-center gap-2">
        <span class="w-7 h-7 rounded-full border-2 border-slate-300 text-slate-400 flex items-center justify-center text-xs font-semibold">3</span>
        <span class="text-slate-400">Confirmación</span>
      </div>
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
      <div class="lg:col-span-2 space-y-6">
        <div class="bg-white rounded-xl border border-slate-200 p-6">
          <h2 class="text-lg font-semibold text-slate-900 mb-5">Información de envío</h2>
          <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
            <div class="sm:col-span-2">
              <label for="checkout-nombre" class="block text-sm font-medium text-slate-700 mb-1.5">Nombre completo</label>
              <input type="text" id="checkout-nombre" placeholder="Tu nombre completo" class="w-full px-3 py-2.5 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-950 focus:border-transparent text-slate-900 bg-white placeholder:text-slate-400">
            </div>
            <div>
              <label for="checkout-email" class="block text-sm font-medium text-slate-700 mb-1.5">Email</label>
              <input type="email" id="checkout-email" placeholder="correo@ejemplo.com" class="w-full px-3 py-2.5 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-950 focus:border-transparent text-slate-900 bg-white placeholder:text-slate-400">
            </div>
            <div>
              <label for="checkout-telefono" class="block text-sm font-medium text-slate-700 mb-1.5">Teléfono</label>
              <input type="tel" id="checkout-telefono" placeholder="300 123 4567" class="w-full px-3 py-2.5 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-950 focus:border-transparent text-slate-900 bg-white placeholder:text-slate-400">
            </div>
            <div class="sm:col-span-2">
              <label for="checkout-direccion" class="block text-sm font-medium text-slate-700 mb-1.5">Dirección</label>
              <input type="text" id="checkout-direccion" placeholder="Carrera 50 # 30-20" class="w-full px-3 py-2.5 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-950 focus:border-transparent text-slate-900 bg-white placeholder:text-slate-400">
            </div>
            <div>
              <label for="checkout-ciudad" class="block text-sm font-medium text-slate-700 mb-1.5">Ciudad</label>
              <select id="checkout-ciudad" class="w-full px-3 py-2.5 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-950 focus:border-transparent text-slate-900 bg-white appearance-none">
                <option value="">Selecciona una ciudad</option>
                <option value="Medellín">Medellín</option>
                <option value="Bogotá">Bogotá</option>
                <option value="Cali">Cali</option>
                <option value="Barranquilla">Barranquilla</option>
                <option value="Cartagena">Cartagena</option>
              </select>
            </div>
            <div>
              <label for="checkout-departamento" class="block text-sm font-medium text-slate-700 mb-1.5">Departamento</label>
              <select id="checkout-departamento" class="w-full px-3 py-2.5 text-sm border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-slate-950 focus:border-transparent text-slate-900 bg-white appearance-none">
                <option value="">Selecciona un departamento</option>
                <option value="Antioquia">Antioquia</option>
                <option value="Cundinamarca">Cundinamarca</option>
                <option value="Valle del Cauca">Valle del Cauca</option>
                <option value="Atlántico">Atlántico</option>
                <option value="Bolívar">Bolívar</option>
              </select>
            </div>
          </div>
        </div>

        <div class="bg-white rounded-xl border border-slate-200 p-6">
          <h2 class="text-lg font-semibold text-slate-900 mb-5">Método de pago</h2>
          <div class="space-y-3">
            <label class="flex items-center gap-3 p-3 border border-slate-200 rounded-lg cursor-pointer hover:border-slate-950 transition-colors has-[:checked]:border-slate-950 has-[:checked]:bg-slate-50">
              <input type="radio" name="pago" id="pago-transferencia" value="transferencia" class="accent-slate-950" checked>
              <div>
                <p class="text-sm font-medium text-slate-900">Transferencia bancaria</p>
                <p class="text-xs text-slate-400">Bancolombia, Nequi, Davivienda</p>
              </div>
            </label>
            <label class="flex items-center gap-3 p-3 border border-slate-200 rounded-lg cursor-pointer hover:border-slate-950 transition-colors has-[:checked]:border-slate-950 has-[:checked]:bg-slate-50">
              <input type="radio" name="pago" id="pago-contraentrega" value="contraentrega" class="accent-slate-950">
              <div>
                <p class="text-sm font-medium text-slate-900">Pago contraentrega</p>
                <p class="text-xs text-slate-400">Paga en efectivo cuando recibas</p>
              </div>
            </label>
            <label class="flex items-center gap-3 p-3 border border-slate-200 rounded-lg cursor-pointer hover:border-slate-950 transition-colors has-[:checked]:border-slate-950 has-[:checked]:bg-slate-50">
              <input type="radio" name="pago" id="pago-tarjeta" value="tarjeta" class="accent-slate-950">
              <div>
                <p class="text-sm font-medium text-slate-900">Tarjeta débito/crédito</p>
                <p class="text-xs text-slate-400">Visa, Mastercard, American Express</p>
              </div>
            </label>
          </div>
        </div>

        <div class="bg-white rounded-xl border border-slate-200 p-6">
          <label class="flex items-start gap-3 cursor-pointer">
            <input type="checkbox" id="checkout-terminos" class="mt-0.5 accent-slate-950">
            <span class="text-sm text-slate-600">Acepto los <a href="terminos-condiciones.html" class="text-slate-900 underline hover:no-underline">términos y condiciones</a> y la <a href="politica-privacidad.html" class="text-slate-900 underline hover:no-underline">política de privacidad</a> de OutletShop.</span>
          </label>
        </div>
      </div>

      <div class="lg:col-span-1">
        <div class="bg-white rounded-xl border border-slate-200 p-6 sticky top-24">
          <h2 class="text-sm font-semibold text-slate-900 mb-4">Resumen del pedido</h2>
          <div id="checkout-items" class="space-y-3 text-sm"></div>
          <hr class="border-slate-200 my-4">
          <div class="space-y-2 text-sm">
            <div class="flex justify-between text-slate-600">
              <span>Subtotal (<span id="checkout-cantidad">0</span> items)</span>
              <span class="text-slate-900 font-medium" id="checkout-subtotal">$0</span>
            </div>
            <div class="flex justify-between text-slate-600">
              <span>Envío</span>
              <span class="text-slate-900 font-medium" id="checkout-envio">$9,900</span>
            </div>
          </div>
          <hr class="border-slate-200 my-4">
          <div class="flex justify-between text-base font-semibold text-slate-900">
            <span>Total</span>
            <span id="checkout-total">$0</span>
          </div>
          <button id="btn-confirmar-pedido" class="mt-6 w-full px-6 py-3 bg-slate-950 text-white text-sm font-medium rounded-lg hover:bg-slate-800 transition-colors disabled:opacity-50 disabled:cursor-not-allowed">
            <span id="btn-confirmar-texto">Confirmar pedido</span>
            <span id="btn-confirmar-spinner" class="hidden inline-block w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin ml-2 align-middle"></span>
          </button>
          <p class="mt-3 text-xs text-slate-400 text-center">Recibirás confirmación por email</p>
        </div>
      </div>
    </div>
  </main>

  <div id="footer"></div>

  <a href="https://wa.me/573054476133" class="whatsapp-float" target="_blank" rel="noopener" aria-label="WhatsApp">
    <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347zm-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884zm8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
  </a>

  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('service-worker.js');
    }
  </script>
  <script src="js/api/supabase-client.js"></script>
  <script src="js/api/productos.js"></script>
  <script src="js/api/categorias.js"></script>
  <script src="js/compartido/utils.js"></script>
  <script src="js/compartido/modal.js"></script>
  <script src="js/compartido/navbar-store.js"></script>
  <script src="js/compartido/footer-store.js"></script>
  <script src="js/paginas/checkout.js"></script>
</body>
</html>
